services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stocklab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stocklab}
      POSTGRES_DB: ${POSTGRES_DB:-stocklab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stocklab}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://stocklab:stocklab@postgres:5432/stocklab}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  ingestion:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://stocklab:stocklab@postgres:5432/stocklab}
    command: ["python", "-m", "app.ingestion.scheduler"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
